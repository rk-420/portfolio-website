<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bgGrad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="panelGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <filter id="soft2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0b1a3a" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bgGrad2)"/>

  <g filter="url(#soft2)">
    <rect x="70" y="60" width="660" height="380" rx="18" fill="url(#panelGrad)"/>
  </g>

  <!-- top bar -->
  <circle cx="98" cy="88" r="6" fill="#475569"/>
  <circle cx="118" cy="88" r="6" fill="#475569"/>
  <circle cx="138" cy="88" r="6" fill="#475569"/>
  <text x="700" y="93" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8">Live · NLP sentiment feed</text>

  <!-- stat cards -->
  <rect x="98" y="112" width="150" height="70" rx="10" fill="#1e293b" stroke="#334155"/>
  <text x="112" y="136" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">Portfolio</text>
  <text x="112" y="160" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#f8fafc">$128,940</text>

  <rect x="262" y="112" width="150" height="70" rx="10" fill="#1e293b" stroke="#334155"/>
  <text x="276" y="136" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">Daily change</text>
  <text x="276" y="160" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#4ade80">+3.2%</text>

  <rect x="426" y="112" width="150" height="70" rx="10" fill="#1e293b" stroke="#334155"/>
  <text x="440" y="136" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">Sentiment</text>
  <text x="440" y="160" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#38bdf8">Bullish</text>

  <rect x="590" y="112" width="120" height="70" rx="10" fill="#1e293b" stroke="#334155"/>
  <text x="604" y="136" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">Forecast</text>
  <text x="604" y="160" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#f8fafc">7d ↑</text>

  <!-- chart panel -->
  <rect x="98" y="200" width="612" height="180" rx="10" fill="#111c34"/>

  <!-- candlesticks -->
  <g stroke="#475569">
    <line x1="130" y1="240" x2="130" y2="340" stroke-width="2"/>
    <line x1="160" y1="220" x2="160" y2="330" stroke-width="2"/>
    <line x1="190" y1="260" x2="190" y2="350" stroke-width="2"/>
    <line x1="220" y1="210" x2="220" y2="300" stroke-width="2"/>
    <line x1="250" y1="230" x2="250" y2="320" stroke-width="2"/>
  </g>
  <g>
    <rect x="124" y="260" width="12" height="50" fill="#f87171"/>
    <rect x="154" y="240" width="12" height="60" fill="#4ade80"/>
    <rect x="184" y="280" width="12" height="45" fill="#f87171"/>
    <rect x="214" y="230" width="12" height="55" fill="#4ade80"/>
    <rect x="244" y="250" width="12" height="50" fill="#4ade80"/>
  </g>

  <!-- forecast line -->
  <path d="M280 320 L340 300 L400 310 L460 260 L520 275 L580 230 L640 245 L690 200"
        fill="none" stroke="url(#lineGrad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="690" cy="200" r="5" fill="#818cf8"/>

  <text x="98" y="398" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8">Python · Flask · REST API · NLTK · Scikit-learn</text>
</svg>
