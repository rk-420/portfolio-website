<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bgGrad3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d1fae5"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
    <linearGradient id="editorGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1f14"/>
      <stop offset="100%" stop-color="#12281a"/>
    </linearGradient>
    <filter id="soft3" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#08340f" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bgGrad3)"/>

  <g filter="url(#soft3)">
    <rect x="70" y="60" width="460" height="380" rx="16" fill="url(#editorGrad)"/>
  </g>
  <circle cx="98" cy="88" r="6" fill="#2f4d38"/>
  <circle cx="118" cy="88" r="6" fill="#2f4d38"/>
  <circle cx="138" cy="88" r="6" fill="#2f4d38"/>
  <text x="500" y="93" text-anchor="end" font-family="monospace" font-size="11" fill="#6ee7b7">Main.java</text>

  <!-- code lines -->
  <g font-family="monospace" font-size="12">
    <text x="94" y="126" fill="#4ade80">1</text>
    <text x="120" y="126" fill="#a7f3d0">public class Main {</text>

    <text x="94" y="148" fill="#4ade80">2</text>
    <text x="140" y="148" fill="#93c5fd">int</text>
    <text x="168" y="148" fill="#e2e8f0">total = 0;</text>

    <rect x="82" y="158" width="436" height="22" rx="4" fill="#166534" fill-opacity="0.55"/>
    <text x="94" y="174" fill="#bbf7d0">3</text>
    <text x="140" y="174" fill="#facc15">for</text>
    <text x="172" y="174" fill="#e2e8f0">(int i = 0; i &lt; n; i++) {</text>

    <text x="94" y="196" fill="#4ade80">4</text>
    <text x="160" y="196" fill="#e2e8f0">total += values[i];</text>

    <text x="94" y="218" fill="#4ade80">5</text>
    <text x="140" y="218" fill="#e2e8f0">}</text>

    <text x="94" y="240" fill="#4ade80">6</text>
    <text x="140" y="240" fill="#e2e8f0">verify(total);</text>

    <text x="94" y="262" fill="#4ade80">7</text>
    <text x="120" y="262" fill="#a7f3d0">}</text>
  </g>

  <!-- trace arrow -->
  <path d="M100 169 h420" stroke="#4ade80" stroke-width="1" stroke-dasharray="3 3" opacity="0.5"/>
  <circle cx="500" cy="169" r="5" fill="#4ade80"/>

  <!-- right panel: variable inspector -->
  <g filter="url(#soft3)">
    <rect x="552" y="60" width="178" height="380" rx="16" fill="#ffffff"/>
  </g>
  <text x="572" y="94" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0f3d20">Runtime trace</text>

  <rect x="572" y="112" width="138" height="44" rx="8" fill="#ecfdf3"/>
  <text x="582" y="130" font-family="monospace" font-size="10" fill="#166534">n</text>
  <text x="582" y="146" font-family="monospace" font-size="12" fill="#0f3d20" font-weight="bold">5</text>

  <rect x="572" y="164" width="138" height="44" rx="8" fill="#ecfdf3"/>
  <text x="582" y="182" font-family="monospace" font-size="10" fill="#166534">i</text>
  <text x="582" y="198" font-family="monospace" font-size="12" fill="#0f3d20" font-weight="bold">3</text>

  <rect x="572" y="216" width="138" height="44" rx="8" fill="#ecfdf3"/>
  <text x="582" y="234" font-family="monospace" font-size="10" fill="#166534">total</text>
  <text x="582" y="250" font-family="monospace" font-size="12" fill="#0f3d20" font-weight="bold">42</text>

  <rect x="572" y="280" width="138" height="90" rx="8" fill="#0f3d20"/>
  <text x="584" y="300" font-family="Arial, sans-serif" font-size="10" fill="#bbf7d0">JBMC symbolic</text>
  <text x="584" y="314" font-family="Arial, sans-serif" font-size="10" fill="#bbf7d0">execution</text>
  <rect x="584" y="326" width="114" height="6" rx="3" fill="#134e2c"/>
  <rect x="584" y="326" width="80" height="6" rx="3" fill="#4ade80"/>
  <text x="584" y="352" font-family="Arial, sans-serif" font-size="9" fill="#86efac">verifying path 4/5</text>

  <text x="70" y="466" font-family="Arial, sans-serif" font-size="12" fill="#0f3d20">Java · JBMC · Git · Scrum/Kanban</text>
</svg>
